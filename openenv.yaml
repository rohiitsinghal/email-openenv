name: email_triage_openenv
description: >
  Partial-observability email triage environment with multi-domain consequence chains,
  semantic reply scoring, sender-trust tracking, calendar conflict detection,
  dependency-aware planning, and long-horizon simulated timelines.

observation_space:
  emails:
    type: list
    fields: [id, subject, body, priority, domain, due_day, dependency_ids,
             sender, sender_role, thread_id, urgency_score, context_clue]
  history: list
  current_day: int              # 1–14 simulated day
  user_trust: float             # 0.0–1.5, evolves with decision quality
  world_model:
    work_actions: int
    personal_actions: int
    feedback_count: int
    feedback_sum: float
    spawned_followups: list
    budget_remaining: float     # Tracks approval budget for round2
    sender_trust: dict          # Per sender_role trust scores
    committed_days: dict        # Calendar commitments by due_day
    thread_memory: dict         # Per thread_id action history

action_space:
  action_type:
    type: enum
    values: [reply, ignore, escalate]
  email_id: int
  content:
    type: string
    description: >
      Reply or escalation message. Quality is semantically scored — generic
      acknowledgements are penalised. Content must match label, priority, and sender_role.
  actor:
    type: enum
    values: [coordinator, triage_agent, planning_agent, communication_agent]
  feedback:
    type: float
    range: [-1.0, 1.0]
    description: Self-reported confidence signal for self-improvement loops

reward:
  type: float
  range: [-2.0, 1.2]
  components:
    - step_penalty: scaled by difficulty (0.02–0.08 per step)
    - task_reward: semantic rubric score for action type + content quality
    - completion_bonus: scaled by difficulty (0.2–0.5 for full inbox completion)
    - consequence_penalty: -0.3 for spawning follow-up via mishandling high-priority
    - dependency_penalty: -0.3 for acting before dependencies are resolved
    - overdue_penalty: -0.4 for ignoring past-due emails
    - conflict_bonus: ±0.15 for correctly detecting/missing calendar conflicts
    - thread_continuity_bonus: +0.05 for coherent multi-turn thread handling
    - balance_bonus: up to +0.06 for maintaining work/personal action balance
    - sender_trust_bonus: accumulated trust improves episode-level scoring

levels:
  easy:
    description: Unambiguous triage. Spam vs work vs complaint clearly signalled.
    emails: 5
    step_penalty: 0.02
    completion_bonus: 0.5
  medium:
    description: Mixed urgency. Some spam looks like security alerts. Complaints vary in severity.
    emails: 6
    step_penalty: 0.03
    completion_bonus: 0.4
  hard:
    description: >
      Deceptive signals. Real security alerts look like spam. Polite complaints have
      high $ severity. CEO mentions don't mean urgent. Dependency ordering required.
      Reply content quality strongly affects score.
    emails: 7
    step_penalty: 0.05
    completion_bonus: 0.3
  round2:
    description: >
      Long-horizon personal + work integration. Budget constraints. Calendar conflicts.
      Consequence chains block downstream emails. Thread continuity scored.
      14-day simulated timeline. Sender trust evolves. World model state affects grading.
    emails: 8
    step_penalty: 0.08
    completion_bonus: 0.2